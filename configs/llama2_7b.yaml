# Primary model — LLaMA-2-7B
model: meta-llama/Llama-2-7b-hf
hidden_size: 4096
torch_dtype: bfloat16          # bf16 throughout — better on H100, avoids fp16 overflow when squaring grads
use_flash: true

calibration:
  source: c4
  n_samples: 128
  seq_len: 2048
  seed: 0

eval:
  ppl: true
  zero_shot: true
  mmlu: true
  ppl_seq_len: 2048
